services:
  bff-db:
    image: postgres:16
    container_name: gasvision_bff_db
    environment:
      POSTGRES_USER: ${BFF_DB_USER:?BFF_DB_USER is required}
      POSTGRES_PASSWORD: ${BFF_DB_PASSWORD:?BFF_DB_PASSWORD is required}
      POSTGRES_DB: ${BFF_DB_NAME:?BFF_DB_NAME is required}
    volumes:
      - bff_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  bff:
    build:
      context: ./bff-service
    container_name: gasvision_bff
    environment:
      database_url: postgresql+psycopg2://${BFF_DB_USER:?BFF_DB_USER is required}:${BFF_DB_PASSWORD:?BFF_DB_PASSWORD is required}@bff-db:5432/${BFF_DB_NAME:?BFF_DB_NAME is required}
      jwt_secret: ${BFF_JWT_SECRET:?BFF_JWT_SECRET is required}
      jwt_algorithm: ${BFF_JWT_ALGORITHM:-HS256}
      access_token_expire_minutes: ${BFF_ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      event_service_base_url: ${EVENT_SERVICE_BASE_URL:?EVENT_SERVICE_BASE_URL is required}
      cors_origins: ${BFF_CORS_ORIGINS:?BFF_CORS_ORIGINS is required}
      seed_demo_data: ${BFF_SEED_DEMO_DATA:-false}
      demo_dispatcher_email: ${BFF_DEMO_DISPATCHER_EMAIL:-}
      demo_dispatcher_password: ${BFF_DEMO_DISPATCHER_PASSWORD:-}
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bff-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_DEMO_EMAIL: ${FRONTEND_DEMO_EMAIL:-}
        VITE_DEMO_PASSWORD: ${FRONTEND_DEMO_PASSWORD:-}
    container_name: gasvision_frontend
    depends_on:
      - bff

  nginx:
    image: nginx:1.27-alpine
    container_name: gasvision_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - bff

volumes:
  bff_pgdata:
