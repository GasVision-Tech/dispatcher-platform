services:
  bff-db:
    image: postgres:16
    container_name: gasvision_bff_db
    environment:
      POSTGRES_USER: bff_user
      POSTGRES_PASSWORD: bff_pass
      POSTGRES_DB: bff_db
    volumes:
      - bff_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bff_user -d bff_db"]
      interval: 3s
      timeout: 3s
      retries: 20

  bff:
    build:
      context: ./bff-service
    container_name: gasvision_bff
    environment:
      database_url: postgresql+psycopg2://bff_user:bff_pass@bff-db:5432/bff_db
      jwt_secret: dev-secret-key
      event_service_base_url: ${EVENT_SERVICE_BASE_URL:-http://host.docker.internal:8000}
      cors_origins: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bff-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: gasvision_frontend
    depends_on:
      - bff

  nginx:
    image: nginx:1.27-alpine
    container_name: gasvision_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - bff

volumes:
  bff_pgdata:
